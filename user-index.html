<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
<!-- YOUR THEME -->
<link rel="stylesheet" href="assets/css/theme.css">
<link rel="stylesheet" href="assets/css/style.css">
<title>Wedding User</title>

<style>
body {
  font-family: system-ui, sans-serif;
}
.font-script {
  font-family: 'Great Vibes', cursive;
}
.font-serif {
  font-family: 'Cormorant Garamond', serif;
}
</style>
</head>

<body class="bg-[var(--color-bg)] flex justify-center">

<!-- MOBILE CONTAINER -->
<div class="w-full max-w-[430px] min-h-screen bg-[var(--color-bg)] shadow-2xl overflow-hidden"> 
    <!-- APP WRAPPER -->
    <div class="min-h-screen bg-[var(--color-bg)] flex flex-col">
        <!-- PAGE CONTENT (dynamic area) -->
        <div id="page-content" class="flex-1 pb-20">
            <!-- Camera / Album / Profile content loads here -->
        </div>
        <!-- ===================== -->
        <!-- 📱 BOTTOM NAV BAR -->
        <!-- ===================== -->

        <div class="fixed bottom-0 left-0 right-0 flex justify-center">
        
        <div class="w-full max-w-[430px] bg-[var(--color-bg)]/95 backdrop-blur-md border-t border-[var(--color-border)] flex justify-around items-center py-2 relative">

            <!-- ================= ALBUM ================= -->
            <button onclick="showPage('album')" 
            class="flex flex-col items-center text-xs text-[var(--color-muted)] hover:text-[var(--color-primary)] transition">

            <!-- icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>

            Album
            </button>

            <!-- ================= CAMERA (CENTER FLOAT) ================= -->
            <button onclick="showPage('camera')"
            class="absolute -top-7 left-1/2 -translate-x-1/2 
                    w-14 h-14 rounded-full 
                    bg-[var(--color-primary)] 
                    text-white shadow-lg 
                    flex items-center justify-center">

            <!-- camera icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 7h2l2-3h10l2 3h2a2 2 0 012 2v10a2 2 0 01-2 2H3a2 2 0 01-2-2V9a2 2 0 012-2z" />
                <circle cx="12" cy="13" r="3" stroke-width="1.5"/>
            </svg>

            </button>

            <!-- ================= PROFILE ================= -->
            <button onclick="showPage('profile')" 
            class="flex flex-col items-center text-xs text-[var(--color-muted)] hover:text-[var(--color-primary)] transition">

            <!-- icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M5.121 17.804A10.97 10.97 0 0112 15c2.21 0 4.253.657 5.879 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>

            Profile
            </button>

        </div>
        </div>
    </div>
</div>
<!-- IMAGE MODAL -->
<div id="imageModal" 
     class="fixed inset-0 hidden items-center justify-center z-50">

  <!-- background -->
  <div id="modalBg" class="absolute inset-0 bg-black/80"></div>

  <!-- content -->
  <div class="relative w-[90%] max-w-sm bg-[var(--color-bg)] rounded-3xl p-4 shadow-2xl animate-fade">

    <!-- image -->
    <img id="modalImg"
         class="w-full h-60 object-cover rounded-2xl mb-4">

    <!-- caption -->
    <h3 id="modalCaption"
        class="text-lg font-script text-[var(--color-text)] mb-2"></h3>

    <!-- description -->
    <p id="modalDesc"
       class="text-sm text-[var(--color-muted)] leading-relaxed"></p>

  </div>
</div>

<!-- PHOTO PREVIEW MODAL -->
<div id="previewModal" class="fixed inset-0 hidden items-center justify-center z-50">

  <!-- background -->
  <div class="absolute inset-0 bg-black/80" onclick="closePreview()"></div>

  <!-- content -->
  <div class="relative w-[90%] max-w-sm bg-[var(--color-bg)] rounded-3xl p-4 shadow-2xl animate-fade">

    <!-- image -->
    <img id="previewImg" class="w-full h-60 object-cover rounded-2xl mb-4"/>
    
    <!-- description -->
    <textarea id="descInput"
      placeholder="Share your message for the couple..."
      rows="3"
      class="w-full mb-4 px-4 py-2 rounded-xl border border-[var(--color-border)] bg-transparent text-sm outline-none"></textarea>

    <!-- buttons -->
    <div class="flex gap-2">
      <button onclick="closePreview()"
        class="flex-1 py-2 rounded-xl border border-[var(--color-border)] text-sm">
        Cancel
      </button>

      <button id="saveBtn" onclick="savePhoto()"
        class="flex-1 py-2 rounded-xl bg-[var(--color-primary)] text-white text-sm">
        Save
      </button>
    </div>

  </div>
</div>

<script type="module">
import {
  db, ensureSignedIn,
  collection, onSnapshot, query, where, orderBy, addDoc, serverTimestamp,
  storage, ref, uploadString, getDownloadURL
} from "./assets/js/firebase-config.js";
import { requireSession, clearSession } from "./assets/js/auth.js";

const session = requireSession("guest"); // redirects if not logged in / wrong role
if (!session) throw new Error("Not authenticated - redirecting to login.");

let currentUser = null;
ensureSignedIn().then(user => { currentUser = user; });

let myPhotos = [];

const photosQuery = query(
  collection(db, "photos"),
  where("uploadedBy", "==", session.id)
);

onSnapshot(photosQuery, (snapshot) => {
  myPhotos = snapshot.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .sort((a, b) => {
      const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
      const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
      return tb - ta; // newest first
    });
  if (currentPage === "album") renderAlbum();
}, (err) => {
  console.error("Failed to load photos:", err);
});

function renderAlbum() {
  const grid = document.getElementById("albumGrid");
  if (!grid) return;

  if (myPhotos.length === 0) {
    grid.innerHTML = `<p class="col-span-2 text-center text-xs text-[var(--color-muted)] py-8">No photos yet — capture or upload your first memory!</p>`;
    return;
  }

  grid.innerHTML = myPhotos.map(p => `
    <div class="relative rounded-2xl overflow-hidden aspect-square">
      <img src="${p.imageUrl}"
        class="album-img w-full h-full object-cover cursor-pointer"
        data-caption="${(p.title || '').replace(/"/g, '&quot;')}"
        data-desc="${(p.caption || '').replace(/"/g, '&quot;')}">
    </div>
  `).join("");
}

// ==========================
// GALLERY STATE
// ==========================
let imageList = [];
let currentIndex = 0;
let useFrontCamera = true;
let tempImageData = null;

// ==========================
// OPEN IMAGE (MAIN)
// ==========================
function openImage(src, caption = "", desc = "") {
  const modal = document.getElementById("imageModal");

  document.getElementById("modalImg").src = src;
  document.getElementById("modalCaption").innerText = caption;
  document.getElementById("modalDesc").innerText = desc;

  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

// ==========================
// BUILD IMAGE ARRAY + INDEX
// ==========================
function setupImageList(src) {
  const imgs = document.querySelectorAll(".album-img");

  imageList = Array.from(imgs).map(img => img.src);
  currentIndex = imageList.indexOf(src);
}

// ==========================
// NAVIGATE IMAGES
// ==========================
function showImage(index) {
  if (index < 0) index = imageList.length - 1;
  if (index >= imageList.length) index = 0;

  currentIndex = index;

  const modalImg = document.getElementById("modalImg");
  modalImg.src = imageList[currentIndex];
}

function nextImage() {
  showImage(currentIndex + 1);
}

function prevImage() {
  showImage(currentIndex - 1);
}

// ==========================
// CLOSE MODAL
// ==========================
function closeImage() {
  const modal = document.getElementById("imageModal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

// ==========================
// DOM READY
// ==========================
document.addEventListener("DOMContentLoaded", () => {

  document.getElementById("modalBg").addEventListener("click", closeImage);

  // swipe support
  let startX = 0;

  const modalImg = document.getElementById("modalImg");

  modalImg.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
  });

  modalImg.addEventListener("touchend", (e) => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
      nextImage(); // swipe left
    } else if (endX - startX > 50) {
      prevImage(); // swipe right
    }
  });

  // click delegation for images
  document.addEventListener("click", (e) => {
    if (e.target.classList.contains("album-img")) {

      const src = e.target.src;
      const caption = e.target.dataset.caption || "";
      const desc = e.target.dataset.desc || "";

      openImage(src, caption, desc);
    }
  });
});


// ==========================
// PAGE SYSTEM
// ==========================
let stream = null;
let currentPage = "album";
function showPage(page) {
  const content = document.getElementById("page-content");
    if (currentPage === "camera" && page !== "camera") {
    stopCamera();
  }

  currentPage = page;
  if (page === "album") {
    stopCamera();
    content.innerHTML = `
      <div class="p-4">

        <div class="flex flex-col items-center justify-center text-center py-6">
            <!-- MAIN TITLE -->
            <h2 class="text-3xl font-script text-[var(--color-text)] leading-tight tracking-wide">
                Wedding Album
            </h2>

            <!-- SUBTITLE -->
            <p class="mt-2 text-xs tracking-[0.3em] uppercase text-[var(--color-muted)]">
                All memories captured
            </p>

            <!-- DECOR LINE -->
            <div class="mt-4 w-16 h-[1px] bg-[var(--color-border)] opacity-60"></div>

        </div>

        <div class="grid grid-cols-2 gap-2">
          <div id="albumGrid" class="grid grid-cols-2 gap-2 col-span-2"></div>

        </div>
      </div>
    `;
    renderAlbum();
  }

    if (page === "camera") {
    setTimeout(() => {
      startCamera();
    }, 300);
    content.innerHTML = `
      <div class="fixed top-0 left-0 right-0 bottom-[76px] flex justify-center z-10">
        <div class="w-full max-w-[430px] h-full flex flex-col px-4 pt-4">

          <!-- TITLE -->
          <div class="text-center mb-3 shrink-0">
            <h2 class="text-2xl font-script text-black drop-shadow">
              Capture Moment
            </h2>
            <p class="text-xs tracking-[0.25em] uppercase text-black/70 mt-1">
              Wedding Photo Booth
            </p>
          </div>

          <!-- CAMERA FRAME (fills remaining space) -->
          <div class="relative flex-1 min-h-0 rounded-3xl overflow-hidden bg-black shadow-2xl">

            <video id="cameraVideo"
              autoplay
              playsinline
              class="w-full h-full object-cover transition-transform duration-200"></video>

            <div class="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-black/10 pointer-events-none"></div>

            <div class="absolute inset-0 border border-white/10 rounded-3xl pointer-events-none"></div>

          </div>

          <!-- CONTROLS ROW -->
          <div class="flex items-center justify-between w-full mt-4 mb-2 shrink-0 px-4">
              <label
                class="w-12 h-12 rounded-full bg-white/20 backdrop-blur flex items-center justify-center border border-[var(--color-primary)]/30 text-[var(--color-primary)] cursor-pointer">

                <!-- upload icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12V3m0 0l-3 3m3-3l3 3" />
                </svg>

                <!-- hidden file input -->
                <input type="file" accept="image/*" class="hidden" onchange="uploadImage(event)">
              </label>


            <!-- CENTER: CAPTURE -->
            <button onclick="takePhoto()"
              class="w-16 h-16 rounded-full bg-[var(--color-primary)] shadow-xl flex items-center justify-center border-4 border-white">

              <div class="w-6 h-6 rounded-full border-2 border-white"></div>

            </button>

            <!-- LEFT: FLIP CAMERA -->
            <button onclick="flipCamera()"
              class="w-12 h-12 rounded-full bg-white/20 backdrop-blur flex items-center justify-center border border-[var(--color-primary)]/30 text-[var(--color-primary)]">

              <!-- flip icon -->
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M4 4v6h6M20 20v-6h-6M5 19a9 9 0 0114-14M19 5a9 9 0 01-14 14" />
              </svg>

            </button>

          </div>
          <canvas id="photoCanvas" class="hidden"></canvas>
        </div>
      </div>
    `;
    }

    if (page === "profile") {
    stopCamera();

    content.innerHTML = `
        <div class="p-6 flex flex-col items-center text-center min-h-[80vh]">

        <!-- AVATAR -->
        <div class="w-24 h-24 rounded-full bg-[var(--color-primary)]/20 flex items-center justify-center shadow-lg border border-[var(--color-border)]">
            <span class="text-2xl font-script text-[var(--color-text)]">
            ${(session.name || "").split(" ").map(w => w[0]).join("").toUpperCase()}
            </span>
        </div>

        <!-- NAME -->
        <h2 class="mt-4 text-2xl font-script text-[var(--color-text)]">
            ${session.name}
        </h2>

        <!-- TAG -->
        <p class="text-xs tracking-[0.25em] uppercase text-[var(--color-muted)] mt-1">
            Wedding Guest
        </p>

        <!-- DIVIDER -->
        <div class="my-6 w-20 h-[1px] bg-[var(--color-border)] opacity-60"></div>

        <!-- MESSAGE CARD -->
        <div class="w-full bg-white/5 backdrop-blur-md rounded-2xl p-4 border border-[var(--color-border)] shadow-md">
            <p class="text-sm text-[var(--color-text)] leading-relaxed">
            Thank you for being part of our special day.  
            Every smile, every photo, and every moment captured here
            means the world to us.
            </p>
        </div>

        <!-- SPACER (push button to bottom) -->
        <div class="flex-1"></div>

        <!-- SIGN OUT BUTTON -->
        <a href="#" onclick="signOut(); return false;"
            class="mt-8 w-full max-w-sm py-3 rounded-2xl bg-[var(--color-primary)] hover:bg-[var(--color-primary-hover)] text-white font-medium shadow-lg active:scale-95 transition block text-center">
            Sign Out
        </a>

        <!-- FOOTER -->
        <p class="mt-4 text-xs text-[var(--color-muted)]">
            With love & gratitude ❤️
        </p>

        </div>
    `;
    }
}

// default page
showPage("album");

//camera functionality


// START CAMERA
async function startCamera() {
  try {
    const video = document.getElementById("cameraVideo");
    if (!video) return;

    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: useFrontCamera ? "user" : "environment"
      },
      audio: false
    });

    video.srcObject = stream;

    // Mirror only the front (selfie) camera preview
    video.style.transform = useFrontCamera ? "scaleX(-1)" : "scaleX(1)";

  } catch (err) {
    console.error("Camera error:", err);
    alert("Camera not supported or permission denied.");
  }
}

function flipCamera() {
  useFrontCamera = !useFrontCamera;
  startCamera(); // restart with new camera
}

function uploadImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e) {
    openPreview(e.target.result); // SAME FLOW
  };

  reader.readAsDataURL(file);
}

// STOP CAMERA
function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
    stream = null;
  }

  const video = document.getElementById("cameraVideo");
  if (video) video.srcObject = null;
}

// TAKE PHOTO
function takePhoto() {
  const video = document.getElementById("cameraVideo");
  const canvas = document.getElementById("photoCanvas");

  if (!video || !stream) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");

  if (useFrontCamera) {
    // Flip horizontally so the saved photo isn't mirrored/backwards
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }

  ctx.drawImage(video, 0, 0);

  const dataURL = canvas.toDataURL("image/jpeg");

  openPreview(dataURL);
}

// OPEN PREVIEW
function openPreview(src) {
  tempImageData = src;

  document.getElementById("previewImg").src = src;

  document.getElementById("descInput").value = "";

  const modal = document.getElementById("previewModal");
  modal.classList.remove("hidden");
  modal.classList.add("flex");
}

// CLOSE
function closePreview() {
  const modal = document.getElementById("previewModal");
  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

// ==========================
// SAVE PHOTO -> FIREBASE STORAGE + FIRESTORE
// ==========================
async function savePhoto() {
  const desc = document.getElementById("descInput").value.trim();

  if (!tempImageData) return;

  const saveBtn = document.getElementById("saveBtn");
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.innerText = "Uploading...";
  }

  try {
    const filename = `uploads/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
    const storageRef = ref(storage, filename);

    // tempImageData is a base64 data URL from canvas or file reader
    await uploadString(storageRef, tempImageData, "data_url");

    const downloadURL = await getDownloadURL(storageRef);

    await addDoc(collection(db, "photos"), {
      uploadedBy: session.id,
      uploadedByName: session.name,
      title: "Greeting from: " +session.name,       // title is now always the guest's name
      caption: desc || "",       // your existing "desc" input stays as caption
      imageUrl: downloadURL,
      createdAt: serverTimestamp()
    });

    closePreview();

  } catch (err) {
    console.error("Upload failed:", err);
    alert("Upload failed, please try again.");
  } finally {
    if (saveBtn) {
      saveBtn.disabled = false;
      saveBtn.innerText = "Save";
    }
  }
}

// ==========================
// EXPOSE TO INLINE onclick HANDLERS
// (required because this script is type="module")
// ==========================
window.showPage = showPage;
window.savePhoto = savePhoto;
window.closePreview = closePreview;
window.takePhoto = takePhoto;
window.flipCamera = flipCamera;
window.uploadImage = uploadImage;
window.signOut = function() {
  clearSession();
  window.location.href = "login.html";
};
</script>
<style>
.animate-fade {
  animation: fadeIn 0.25s ease-in-out;
}

@keyframes fadeIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</body>
</html>
