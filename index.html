<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/theme.css">
<link rel="stylesheet" href="assets/css/style.css">

<title>Wedding Admin</title>

<style>
body {
  font-family: system-ui, sans-serif;
}

.font-script {
  font-family: 'Great Vibes', cursive;
}

.font-serif {
  font-family: 'Cormorant Garamond', serif;
}
</style>
</head>

<body class="bg-[var(--color-bg)] flex justify-center">

<!-- MOBILE CONTAINER -->
<div class="w-full max-w-[430px] min-h-screen bg-[var(--color-bg)] shadow-2xl overflow-hidden">

  <div class="min-h-screen bg-[var(--color-bg)] flex flex-col">

    <!-- PAGE -->
    <div id="page-content" class="flex-1 pb-24"></div>

    <!-- BOTTOM NAV -->
    <div class="fixed bottom-0 left-0 right-0 flex justify-center z-40">

      <div class="w-full max-w-[430px]
                  bg-[var(--color-bg)]/95
                  backdrop-blur-md
                  border-t border-[var(--color-border)]
                  flex justify-around items-center
                  py-2 relative">

        <!-- ALBUM -->
        <button onclick="showPage('album')"
          class="flex flex-col items-center text-xs text-[var(--color-muted)]">

          <svg xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6 mb-1"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>

          Album
        </button>

        <!-- SLIDESHOW BUTTON -->
        <button id="slideshowBtn"
          onclick="openSlideshow()"
          class="absolute -top-7 left-1/2 -translate-x-1/2
                w-14 h-14 rounded-full
                bg-[var(--color-primary)]
                text-white shadow-lg
                flex items-center justify-center">

          <!-- play icon -->
          <svg xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M14.752 11.168l-6.518-3.76A1 1 0 007 8.24v7.52a1 1 0 001.234.972l6.518-3.76a1 1 0 000-1.804z"/>
          </svg>
        </button>

        <!-- PROFILE -->
        <button onclick="showPage('profile')"
          class="flex flex-col items-center text-xs text-[var(--color-muted)]">

          <svg xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6 mb-1"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M5.121 17.804A10.97 10.97 0 0112 15c2.21 0 4.253.657 5.879 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>

          Profile
        </button>

      </div>
    </div>

  </div>
</div>

<!-- VIDEO MODAL -->
<div id="videoModal"
  class="fixed inset-0 hidden items-center justify-center z-50">

  <div class="absolute inset-0 bg-black/80"
    onclick="closeVideoPreview()"></div>

  <div class="relative w-[90%] max-w-sm bg-black rounded-3xl p-3">

    <video id="previewVideo"
      controls
      class="w-full rounded-2xl"></video>

    <div class="flex gap-2 mt-3">

      <a id="downloadBtn"
        class="flex-1 py-2 text-center bg-[var(--color-primary)] text-white rounded-xl">
        Download
      </a>

      <button onclick="closeVideoPreview()"
        class="flex-1 py-2 border rounded-xl text-white">
        Close
      </button>

    </div>
  </div>
</div>

<!-- LOADING -->
<div id="renderLoading"
  class="fixed inset-0 hidden items-center justify-center z-50 bg-black/80">

  <div class="text-center text-white">

    <div class="w-12 h-12 border-4 border-white/30 border-t-white rounded-full animate-spin mx-auto mb-4"></div>

    <p class="text-sm tracking-widest uppercase">
      Generating Slideshow...
    </p>

    <p class="text-xs text-white/60 mt-2">
      Please wait, this may take a moment
    </p>

  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal"
  class="fixed inset-0 hidden items-center justify-center z-50">

  <div id="modalBg"
    class="absolute inset-0 bg-black/80"></div>

  <div class="relative w-[90%] max-w-sm bg-[var(--color-bg)] rounded-3xl p-4 shadow-2xl">

    <img id="modalImg"
      class="w-full h-60 object-contain rounded-2xl mb-4">

    <h3 id="modalCaption"
      class="text-lg font-script text-[var(--color-text)] mb-2"></h3>

    <p id="modalDesc"
      class="text-sm text-[var(--color-muted)] leading-relaxed"></p>

  </div>
</div>
<!-- SLIDESHOW MODAL -->
<div id="slideshowModal"
  class="fixed inset-0 hidden items-center justify-center z-50">

  <div class="absolute inset-0 bg-black/80" onclick="closeSlideshow()"></div>

  <div class="relative w-[90%] max-w-sm">

    <!-- close -->
    <button onclick="closeSlideshow()"
      class="absolute -top-12 right-0 w-9 h-9 rounded-full bg-white/10 text-white flex items-center justify-center">
      ✕
    </button>

    <!-- counter -->
    <div id="slideshowCounter"
      class="text-center text-white/70 text-xs tracking-[0.25em] uppercase mb-3"></div>

    <!-- CARD (same styling language as imageModal) -->
    <div class="relative bg-[var(--color-bg)] rounded-3xl p-4 shadow-2xl overflow-hidden">

      <div id="slideshowCardInner">
        <img id="slideshowImg"
          class="w-full h-72 object-cover rounded-2xl mb-4">

        <h3 id="slideshowTitle"
          class="text-xl font-script text-[var(--color-text)] mb-2"></h3>

        <p id="slideshowCaption"
          class="text-sm text-[var(--color-muted)] leading-relaxed"></p>
      </div>

    </div>

    <!-- controls -->
    <div class="flex items-center justify-center gap-6 mt-5">

      <button onclick="slideshowPrev()"
        class="w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>

      <button onclick="toggleSlideshowPlay()"
        class="w-12 h-12 rounded-full bg-[var(--color-primary)] text-white flex items-center justify-center">
        <svg id="slideshowPlayIcon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 9v6m4-6v6"/>
        </svg>
      </button>

      <button onclick="slideshowNext()"
        class="w-10 h-10 rounded-full bg-white/10 text-white flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
        </svg>
      </button>

    </div>

  </div>

</div>

<style>
#slideshowCardInner {
  transition: opacity 0.35s ease, transform 0.35s ease;
  opacity: 1;
  transform: translateX(0) scale(1);
}
#slideshowCardInner.ss-out-next {
  opacity: 0;
  transform: translateX(-24px) scale(0.97);
}
#slideshowCardInner.ss-out-prev {
  opacity: 0;
  transform: translateX(24px) scale(0.97);
}
</style>
<script>
  
</script>
<script type="module" src="assets/js/app.js"></script>

</body>
</html>
